<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cywis Business Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Exact Corporate Blue matching the Logo image */
      --logo-blue:      #0047a0;
      --logo-blue-glow: rgba(0, 71, 160, 0.35);
      --dark-bg:        #020b18;
      --panel-bg:       rgba(3, 18, 41, 0.75);
      --card-bg:        rgba(5, 28, 64, 0.6);
      
      /* Gamified Accents */
      --accent-gold:    #ffd700;
      --accent-gold-rgb: 255, 215, 0;
      --xp-green:       #00ffcc;
      
      /* Structural System */
      --border-soft:    rgba(255, 255, 255, 0.08);
      --border-bright:  rgba(255, 255, 255, 0.2);
      --white:          #ffffff;
      --white-dim:      rgba(255, 255, 255, 0.75);
      --white-faint:    rgba(255, 255, 255, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--dark-bg);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HIGH-END LUXURY BACKGROUND ── */
    .bg-fixed {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 15% 20%, var(--logo-blue-glow) 0%, transparent 55%),
        radial-gradient(circle at 85% 80%, rgba(2, 20, 50, 0.8) 0%, transparent 65%),
        linear-gradient(160deg, #020710 0%, #04142c 50%, #020710 100%);
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.04;
      background-image: 
        linear-gradient(to right, #fff 1px, transparent 1px),
        linear-gradient(to bottom, #fff 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
    }

    /* ── HEADER ── */
    header { text-align: center; padding: 1.5rem 0 2rem; }

    .logo-container {
      position: relative;
      width: 100px; height: 100px;
      margin: 0 auto 1.5rem;
    }

    .logo-wrap {
      width: 100%; height: 100%;
      background: #ffffff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      padding: 14px;
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 2px solid var(--logo-blue);
    }

    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Gamified Pulse Ring */
    .logo-pulse {
      position: absolute; inset: -4px;
      border: 2px dashed var(--accent-gold);
      border-radius: 50%;
      z-index: 1;
      animation: rotateRing 20s linear infinite;
      opacity: 0.7;
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .site-title {
      font-size: clamp(22px, 5vw, 36px);
      font-weight: 900;
      color: var(--white);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0, 71, 160, 0.4);
    }

    .site-sub {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-top: 8px;
      font-weight: 600;
    }

    /* ── USER SYSTEMS BAR (GAMIFIED DASHBOARD HUD) ── */
    .hud-bar {
      background: var(--panel-bg);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 2.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .hud-stat {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hud-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--white-faint);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .hud-value {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-gold {
      color: var(--accent-gold);
      font-size: 12px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255, 215, 0, 0.05);
    }

    /* Interactive XP Line Tracker */
    .xp-container {
      width: 100%;
    }
    .xp-bar-bg {
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 5px;
      position: relative;
    }
    .xp-bar-fill {
      width: 75%; height: 100%;
      background: linear-gradient(90deg, var(--logo-blue), var(--xp-green));
      border-radius: 3px;
      transition: width 0.5s ease;
      box-shadow: 0 0 8px var(--xp-green);
    }

    /* ── ELEGANT TAB REGION ── */
    .tabs-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 0;
    }

    .tab-btn {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px 28px;
      border: 1px solid var(--border-soft);
      border-bottom: none;
      background: rgba(4, 15, 35, 0.6);
      color: var(--white-faint);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 6px 6px 0 0;
      position: relative;
      bottom: -1px;
      backdrop-filter: blur(4px);
    }

    .tab-btn:hover {
      color: var(--white);
      background: rgba(5, 28, 64, 0.4);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .tab-btn.active {
      background: var(--panel-bg);
      color: var(--accent-gold);
      border-color: var(--border-bright);
      border-bottom-color: #031229; /* Blends into body panel flawlessly */
      font-weight: 900;
    }

    .tab-btn.active::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--logo-blue), var(--accent-gold), var(--logo-blue));
    }

    .tabs-body {
      background: var(--panel-bg);
      border: 1px solid var(--border-bright);
      border-radius: 0 8px 8px 8px;
      padding: 2.2rem 2rem;
      min-height: 400px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: panelReveal 0.4s ease forwards; }

    @keyframes panelReveal {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-heading {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .panel-sub {
      font-size: 13px;
      color: var(--white-dim);
      margin-bottom: 2rem;
    }

    /* ── QUEST CARDS GRID (GAMIFIED SERVICE GRIDS) ── */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .cat-card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .cat-card:hover {
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .cat-card.open {
      border-color: var(--logo-blue);
      background: rgba(4, 25, 58, 0.9);
      box-shadow: 0 0 25px rgba(0, 71, 160, 0.25);
    }

    .cat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px;
    }

    .cat-icon {
      font-size: 20px;
      background: rgba(255,255,255,0.04);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6
